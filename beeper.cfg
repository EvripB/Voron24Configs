[gcode_macro BEEP]
description: Make a sound on the Beeper
gcode:
    # Parameters
    {% set freq = params.PITCH|default(440)|float %}
    {% set time = params.DURATION|default(100)|int %}        ; Duration/wait of each beep in ms. Default 100ms.
    {% set amplitude = params.VOLUME|default(0.3)|float %}
    {% if freq > 50 %}
        SET_PIN PIN=BEEPER VALUE={amplitude} CYCLE_TIME={1/freq}
    {% endif %}
    G4 P{time}
    SET_PIN PIN=BEEPER VALUE=0


# Used for beep tones
[gcode_macro M300]
gcode:
    {% set S = params.S|default(1000)|int %} ; S sets the tone frequency
    {% set P = params.P|default(100)|int %} ; P sets the tone duration
    {% set L = 0.5 %} ; L varies the PWM on time, close to 0 or 1 the tone gets a bit quieter. 0.5 is a symmetric waveform
    {% if S <= 0 %} ; dont divide through zero
        {% set F = 1 %}
        {% set L = 0 %}
    {% elif S >= 10000 %} ;max frequency set to 10kHz
        {% set F = 0 %}
    {% else %}
        {% set F = 1/S %} ;convert frequency to seconds
    {% endif %}
    SET_PIN PIN=BEEPER VALUE={L} CYCLE_TIME={F} ;Play tone
    G4 P{P} ;tone duration
    SET_PIN PIN=BEEPER VALUE=0

[gcode_macro TEST_SOUND]
gcode:
    M300 S440 P200 ; Make Print Completed Tones
    M300 S660 P250
    M300 S880 P300
